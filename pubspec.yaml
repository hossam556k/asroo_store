name: asroo_store
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  connectivity_plus: ^7.1.1
  flutter_dotenv: ^6.0.0
  flutter_screenutil: ^5.9.3
  lottie: ^3.3.3
  easy_localization: ^3.0.8
  animate_do: ^5.1.0






dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0
  flutter_launcher_icons: ^0.14.4



flutter:

  
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/images/
     - assets/fonts/
     - assets/translations/
     - .env.dev
     - .env.prod
  
  
  fonts:
  - family: Cairo
    fonts:
      - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
        weight: 700
      - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
        weight: 500
      - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
        weight: 400

  - family: Poppins
    fonts:
      - asset: assets/fonts/english/poppins/Poppins-Bold.ttf
        weight: 700
      - asset: assets/fonts/english/poppins/Poppins-Medium.ttf
        weight: 500
      - asset: assets/fonts/english/poppins/Poppins-Regular.ttf
        weight: 400
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
